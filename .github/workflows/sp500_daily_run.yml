name: SP500监控每日运行

# ──────────────────────────────────────────────────────────────────────
# V15 触发器系统的云端工作流
# 简化自 v10.3 版本 — 去掉了 data 分支持久化机制
# (新版每次从 yfinance + FRED 拉全历史,无需跨次持久化 CSV 数据库)
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    # ⚠️ GitHub Actions cron 使用 UTC 时间
    # 美东开盘 09:30 ET → 夏令时 EDT 是 UTC 13:30(北京时间 21:30)
    #                  → 冬令时 EST 是 UTC 14:30(北京时间 22:30)
    - cron: '30 13 * * 1-5'     # 夏季 EDT(3-11月):周一到周五,北京时间 21:30
    # - cron: '30 14 * * 1-5'   # 冬季 EST(11月初切换后启用)
  workflow_dispatch:            # 支持在 Actions 页面手动触发

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install yfinance pandas numpy requests fredapi python-docx openpyxl

      - name: 创建工作目录
        run: |
          mkdir -p data logs reports

      - name: 运行监控程序
        env:
          FRED_API_KEY:   ${{ secrets.FRED_API_KEY }}
          EMAIL_ADDRESS:  ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python sp500_main_cloud.py
